github:
  description: Apache ECharts Handbook
  homepage: https://echarts.apache.org/handbook
  ghp_branch: gh-pages
  labels:
    - echarts
    - apache
    - handbook

  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
notifications:
  commits: commits@echarts.apache.org
  pullrequests: commits@echarts.apache.org
  issues: commits@echarts.apache.org
